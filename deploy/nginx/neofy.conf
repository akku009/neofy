# ─────────────────────────────────────────────────────────────────────────────
# Neofy — Production Nginx Configuration
# Place at: /etc/nginx/sites-available/neofy
# Enable:   ln -s /etc/nginx/sites-available/neofy /etc/nginx/sites-enabled/neofy
# Test:     nginx -t
# Reload:   systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Puma upstream (Unix socket — faster than TCP in production) ───────────────
upstream neofy_puma {
    server unix:///var/www/neofy/shared/tmp/sockets/puma.sock fail_timeout=0;
}

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;

# ── HTTP → HTTPS redirect (all hosts) ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Platform: app.neofy.com / api.neofy.com / admin.neofy.com ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neofy.com www.neofy.com app.neofy.com api.neofy.com admin.neofy.com;

    # ── SSL (Let's Encrypt) ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/neofy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neofy.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # Hide server version
    server_tokens off;

    root   /var/www/neofy/current/frontend/dist;
    index  index.html;

    access_log /var/log/nginx/neofy-platform.access.log combined;
    error_log  /var/log/nginx/neofy-platform.error.log  warn;

    client_max_body_size 50M;
    keepalive_timeout    70;

    # ── React frontend (SPA) ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API proxy → Puma ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://neofy_puma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ── Auth endpoints ────────────────────────────────────────────────────────
    location /users/ {
        proxy_pass         http://neofy_puma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Sidekiq Web UI (admin only) ──────────────────────────────────────────
    location /sidekiq {
        proxy_pass         http://neofy_puma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Healthcheck ──────────────────────────────────────────────────────────
    location /up {
        proxy_pass         http://neofy_puma;
        access_log         off;
    }

    # ── Static assets (long cache) ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ── Wildcard: tenant subdomains (*.neofy.com) ─────────────────────────────────
# Rails resolves store from the subdomain via Tenants::ResolveFromRequest
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<subdomain>.+)\.neofy\.com$;

    # Wildcard SSL certificate (required for *.neofy.com)
    # Obtain: certbot certonly --dns-cloudflare -d neofy.com -d *.neofy.com
    ssl_certificate     /etc/letsencrypt/live/neofy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neofy.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header X-Content-Type-Options    nosniff                                always;

    server_tokens off;

    access_log /var/log/nginx/neofy-stores.access.log combined;
    error_log  /var/log/nginx/neofy-stores.error.log  warn;

    client_max_body_size 10M;

    # All storefront + API traffic → Puma
    location / {
        proxy_pass         http://neofy_puma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}

# ── Custom domains (any domain pointing to this server) ──────────────────────
# Rails resolves store from Host header via Domain table lookup.
# SSL: each domain needs its own cert (use Certbot standalone or HTTP-01 challenge).
# For automated per-domain SSL, consider replacing Nginx with Caddy.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Self-signed fallback cert (replace with per-domain cert via Certbot)
    # For full automation: see Caddy note in ARCHITECTURE.md
    ssl_certificate     /etc/letsencrypt/live/neofy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neofy.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # Block suspicious Host headers (no dots → not a valid domain)
    if ($host !~* "^([a-z0-9\-]+\.)+[a-z]{2,}$") {
        return 444;
    }

    server_tokens off;

    access_log /var/log/nginx/neofy-custom-domains.access.log combined;
    error_log  /var/log/nginx/neofy-custom-domains.error.log  warn;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://neofy_puma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
